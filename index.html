<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mp4 \u2014 C Sharan Kumar</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #08090f;
      --surface: #0f1120;
      --card: #13162a;
      --accent1: #ff2d55;
      --accent2: #00e5ff;
      --accent3: #ffe600;
      --text: #e8eaf6;
      --muted: #7880aa;
      --glow1: rgba(255,45,85,0.35);
      --glow2: rgba(0,229,255,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* \u2500\u2500 NOISE OVERLAY \u2500\u2500 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* \u2500\u2500 GRID BG \u2500\u2500 */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* \u2500\u2500 NAV \u2500\u2500 */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px;
      background: rgba(8,9,15,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,229,255,0.1);
    }
    .nav-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--accent2);
      text-shadow: 0 0 16px var(--accent2);
    }
    .nav-logo span { color: var(--accent1); }
    nav ul {
      list-style: none;
      display: flex; gap: 32px;
    }
    nav ul a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav ul a:hover { color: var(--accent2); }

    /* \u2500\u2500 HERO \u2500\u2500 */
    .hero {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 120px 20px 60px;
      overflow: hidden;
    }
    .hero-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .hero-glow.r { width: 500px; height: 500px; background: var(--glow1); top: -100px; right: -100px; animation: floatA 8s ease-in-out infinite alternate; }
    .hero-glow.b { width: 400px; height: 400px; background: var(--glow2); bottom: 0; left: -120px; animation: floatB 10s ease-in-out infinite alternate; }

    @keyframes floatA { from { transform: translate(0,0) scale(1); } to { transform: translate(-40px,60px) scale(1.1); } }
    @keyframes floatB { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,-40px) scale(1.15); } }

    .hero-badge {
      display: inline-block;
      background: rgba(255,45,85,0.15);
      border: 1px solid var(--accent1);
      color: var(--accent1);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 999px;
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease both;
    }
    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.01em;
      animation: fadeUp 0.9s ease 0.1s both;
    }
    .hero h1 .line1 { color: var(--text); display: block; }
    .hero h1 .line2 {
      display: block;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.2rem;
      color: var(--muted);
      margin-top: 20px;
      font-weight: 400;
      letter-spacing: 0.05em;
      animation: fadeUp 1s ease 0.2s both;
    }
    .hero-sub strong { color: var(--text); font-weight: 700; }
    .hero-cta {
      margin-top: 44px;
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
      animation: fadeUp 1s ease 0.35s both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary {
      background: var(--accent1);
      color: #fff;
      box-shadow: 0 0 24px var(--glow1);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--glow1); }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--accent2);
      color: var(--accent2);
    }
    .btn-secondary:hover { background: rgba(0,229,255,0.08); transform: translateY(-2px); }

    .scroll-hint {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      color: var(--muted); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      animation: fadeUp 1.2s ease 0.6s both;
    }
    .scroll-hint .arrow { animation: bounce 1.5s ease infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* \u2500\u2500 SECTIONS \u2500\u2500 */
    section { position: relative; z-index: 1; padding: 90px 40px; }
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .section-title span { color: var(--accent1); }
    .section-desc {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 560px;
      line-height: 1.7;
    }
    .section-head { max-width: 1100px; margin: 0 auto 52px; }

    /* \u2500\u2500 SERVICES \u2500\u2500 */
    #services { background: var(--surface); }
    .services-grid {
      max-width: 1100px; margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 36px 30px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .service-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .service-card.red::before { background: linear-gradient(90deg, var(--accent1), #ff8a00); }
    .service-card.cyan::before { background: linear-gradient(90deg, var(--accent2), #0070ff); }
    .service-card.yellow::before { background: linear-gradient(90deg, var(--accent3), #ff8a00); }
    .service-card.purple::before { background: linear-gradient(90deg, #a855f7, #ec4899); }
    .service-card.green::before { background: linear-gradient(90deg, #22c55e, #00e5ff); }
    .service-card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.15); }
    .service-icon {
      font-size: 2.4rem;
      margin-bottom: 18px;
      display: block;
    }
    .service-card h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .service-card p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }
    .free-badge {
      display: inline-block;
      margin-top: 18px;
      background: rgba(34,197,94,0.15);
      border: 1px solid #22c55e;
      color: #22c55e;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 4px 12px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    /* \u2500\u2500 ABOUT \u2500\u2500 */
    #about {
      background: var(--bg);
    }
    .about-inner {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
    }
    .about-visual {
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-ring {
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 3px solid transparent;
      background: linear-gradient(135deg, var(--accent1), var(--accent2)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .avatar-inner {
      width: 240px; height: 240px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1c3a, #0f1120);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 5rem;
    }
    .about-text .section-desc { margin-bottom: 28px; }
    .stat-row { display: flex; gap: 32px; flex-wrap: wrap; margin-top: 28px; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-num {
